#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex bridge configuration for research-oriented Python work.
# This template is meant to be copied into a workspace root that also contains
# the shared `agent/` repository as a sibling of `.codex/`.
# Reasoning depth is controlled by the role files under `../agent/.codex/agents/`.

sandbox_mode = "read-only"
approval_policy = "on-request"
allow_login_shell = false
web_search = "live"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.python_dev]
description = "Python implementation agent for simulations, data processing, plotting, bug fixes, and test updates."
config_file = "../agent/.codex/agents/python-dev.toml"

[agents.python_architect]
description = "Python planning and architecture agent for experiment structure, decomposition, and risky refactors."
config_file = "../agent/.codex/agents/python-architect.toml"

[agents.python_reviewer]
description = "Python review agent for correctness, reproducibility, regressions, and missing tests."
config_file = "../agent/.codex/agents/python-reviewer.toml"

[agents.explorer]
description = "Read-only exploration agent for tracing code paths and gathering evidence."
config_file = "../agent/.codex/agents/explorer.toml"

[agents.docs_researcher]
description = "Documentation and API verification agent for Sionna, TensorFlow, Python libraries, and primary-source research."
config_file = "../agent/.codex/agents/docs-researcher.toml"

[agents.jp_paper_latex]
description = "Japanese LaTeX paper writing agent for dearu-style drafting and revision."
config_file = "../agent/.codex/agents/jp-paper-latex.toml"

[agents.en_paper_latex]
description = "English LaTeX paper writing agent for concise academic drafting and revision."
config_file = "../agent/.codex/agents/en-paper-latex.toml"
